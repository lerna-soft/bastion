<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal</title>
    <link rel="stylesheet" href="xterm.css">
    <style>
        html, body, #terminal { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
        /* HIM-020: manijas de selección arrastrables (overlay sobre .xterm-screen) */
        .sel-handle {
            position: fixed; width: 30px; height: 30px; margin-left: -15px; margin-top: -6px;
            z-index: 30; display: none; touch-action: none; -webkit-tap-highlight-color: transparent;
        }
        .sel-handle .knob {
            position: absolute; left: 8px; top: 8px; width: 14px; height: 14px;
            background: #009cce; box-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }
        #sel-start .knob { border-radius: 50% 50% 50% 0; }
        #sel-end .knob { border-radius: 50% 50% 0 50%; }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <div id="sel-start" class="sel-handle"><span class="knob"></span></div>
    <div id="sel-end" class="sel-handle"><span class="knob"></span></div>

    <script src="xterm.js"></script>
    <script src="xterm-addon-fit.js"></script>
    <script src="selection-logic.js"></script>
    <script>
        var THEMES = {
            'stitch': {
                background: '#121414', foreground: '#e2e2e2',
                cursor: '#75d1ff', selectionBackground: '#333535',
                black: '#121414', red: '#ffb4ab', green: '#75d1ff', yellow: '#c8c6c5',
                blue: '#009cce', magenta: '#c8c6c5', cyan: '#75d1ff', white: '#e2e2e2',
                brightBlack: '#444748', brightRed: '#ffb4ab', brightGreen: '#75d1ff', brightYellow: '#c8c6c5',
                brightBlue: '#009cce', brightMagenta: '#c8c6c5', brightCyan: '#75d1ff', brightWhite: '#ffffff'
            },
            'default': {
                background: '#1e1e1e', foreground: '#d4d4d4',
                cursor: '#d4d4d4', selectionBackground: '#444444',
                black: '#000000', red: '#cd3131', green: '#0dbc79', yellow: '#e5e510',
                blue: '#2472c8', magenta: '#bc3fbc', cyan: '#11a8cd', white: '#e5e5e5',
                brightBlack: '#666666', brightRed: '#f14c4c', brightGreen: '#23d18b', brightYellow: '#f5f543',
                brightBlue: '#3b8eea', brightMagenta: '#d670d6', brightCyan: '#29b8db', brightWhite: '#e5e5e5'
            },
            'light': {
                background: '#ffffff', foreground: '#000000',
                cursor: '#000000', selectionBackground: '#c0c0c0',
                black: '#000000', red: '#cd3131', green: '#00a800', yellow: '#a8a800',
                blue: '#0000a8', magenta: '#a800a8', cyan: '#00a8a8', white: '#e5e5e5',
                brightBlack: '#666666', brightRed: '#cd3131', brightGreen: '#00a800', brightYellow: '#a8a800',
                brightBlue: '#0000a8', brightMagenta: '#a800a8', brightCyan: '#00a8a8', brightWhite: '#ffffff'
            },
            'monokai': {
                background: '#272822', foreground: '#f8f8f2',
                cursor: '#f8f8f2', selectionBackground: '#49483e',
                black: '#272822', red: '#f92672', green: '#a6e22e', yellow: '#f4bf75',
                blue: '#66d9ef', magenta: '#ae81ff', cyan: '#a1efe4', white: '#f8f8f2',
                brightBlack: '#75715e', brightRed: '#f92672', brightGreen: '#a6e22e', brightYellow: '#f4bf75',
                brightBlue: '#66d9ef', brightMagenta: '#ae81ff', brightCyan: '#a1efe4', brightWhite: '#f9f8f5'
            },
            'solarized-dark': {
                background: '#002b36', foreground: '#839496',
                cursor: '#839496', selectionBackground: '#073642',
                black: '#073642', red: '#dc322f', green: '#859900', yellow: '#b58900',
                blue: '#268bd2', magenta: '#d33682', cyan: '#2aa198', white: '#eee8d5',
                brightBlack: '#002b36', brightRed: '#cb4b16', brightGreen: '#586e75', brightYellow: '#657b83',
                brightBlue: '#839496', brightMagenta: '#6c71c4', brightCyan: '#93a1a1', brightWhite: '#fdf6e3'
            },
            'dracula': {
                background: '#282a36', foreground: '#f8f8f2',
                cursor: '#f8f8f2', selectionBackground: '#44475a',
                black: '#21222c', red: '#ff5555', green: '#50fa7b', yellow: '#f1fa8c',
                blue: '#bd93f9', magenta: '#ff79c6', cyan: '#8be9fd', white: '#f8f8f2',
                brightBlack: '#6272a4', brightRed: '#ff6e6e', brightGreen: '#69ff94', brightYellow: '#ffffa5',
                brightBlue: '#d6acff', brightMagenta: '#ff92df', brightCyan: '#a4ffff', brightWhite: '#ffffff'
            },
            'nord': {
                background: '#2e3440', foreground: '#d8dee9',
                cursor: '#d8dee9', selectionBackground: '#434c5e',
                black: '#3b4252', red: '#bf616a', green: '#a3be8c', yellow: '#ebcb8b',
                blue: '#81a1c1', magenta: '#b48ead', cyan: '#88c0d0', white: '#e5e9f0',
                brightBlack: '#4c566a', brightRed: '#bf616a', brightGreen: '#a3be8c', brightYellow: '#ebcb8b',
                brightBlue: '#81a1c1', brightMagenta: '#b48ead', brightCyan: '#8fbcbb', brightWhite: '#eceff4'
            }
        };

        var currentTheme = 'default';
        var term = new Terminal({
            cursorBlink: true,
            cursorStyle: 'block',
            fontSize: 14,
            fontFamily: 'Menlo, Monaco, "Courier New", monospace',
            theme: THEMES['default'],
            allowProposedApi: true,
            cols: 80,
            rows: 24
        });

        var fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);

        term.open(document.getElementById('terminal'));

        function safeFit() {
            try { fitAddon.fit(); } catch (e) {}
            try { if (typeof positionHandles === 'function' && selActive) positionHandles(); } catch (e) {}
        }

        // Arranca SIEMPRE ajustado. Dentro de un HorizontalPager de Android el WebView puede
        // reportar tamaño 0 (o uno transitorio) durante los primeros cientos de ms, así que un fit
        // escalonado de una sola pasada [50..1000ms] podía correr entero antes de que el contenedor
        // tuviera su tamaño real — dejando el terminal en su 80x24 por defecto hasta que un zoom o
        // rotación disparaba el ResizeObserver y recién ahí se ajustaba. En su lugar reintentamos el
        // fit hasta que las dimensiones se estabilicen (mismo cols/rows dos veces seguidas con el
        // contenedor ya con tamaño no-nulo) o hasta vencer el tope de seguridad.
        function fitUntilStable() {
            var lastCols = -1, lastRows = -1, stableHits = 0, elapsed = 0;
            var STEP = 100, MAX = 6000;
            var timer = setInterval(function() {
                elapsed += STEP;
                safeFit();
                var el = document.getElementById('terminal');
                var hasSize = el && el.clientWidth > 0 && el.clientHeight > 0;
                if (hasSize && term.cols === lastCols && term.rows === lastRows) {
                    stableHits++;
                } else {
                    stableHits = 0;
                }
                lastCols = term.cols;
                lastRows = term.rows;
                if ((hasSize && stableHits >= 2) || elapsed >= MAX) {
                    clearInterval(timer);
                }
            }, STEP);
        }
        fitUntilStable();

        // ResizeObserver: recalcula al cambiar el tamaño real del contenedor (rotación, teclado,
        // volver a la pestaña, etc.) — window.resize solo no basta dentro de un WebView de Android.
        if (window.ResizeObserver) {
            var ro = new ResizeObserver(function() { safeFit(); });
            ro.observe(document.getElementById('terminal'));
        }
        window.addEventListener('resize', safeFit);

        term.onData(function(data) {
            try {
                if (window.BastionBridge) {
                    window.BastionBridge.onData(data);
                }
            } catch(e) {
                console.error('Bastion onData error:', e.message || e);
            }
        });

        var prevCols = term.cols, prevRows = term.rows;
        var resizeCheck = setInterval(function() {
            if (term.cols !== prevCols || term.rows !== prevRows) {
                prevCols = term.cols;
                prevRows = term.rows;
                if (window.BastionBridge) {
                    window.BastionBridge.onResize(prevCols, prevRows);
                }
            }
        }, 300);

        function writeToTerminal(base64Data) {
            try {
                var binaryStr = atob(base64Data);
                var len = binaryStr.length;
                var bytes = new Uint8Array(len);
                for (var i = 0; i < len; i++) {
                    bytes[i] = binaryStr.charCodeAt(i);
                }
                term.write(bytes);
            } catch(e) {
                console.error('writeToTerminal error:', e);
            }
        }

        function setSize(cols, rows) {
            term.resize(cols, rows);
            fitAddon.fit();
        }

        function setFontSize(size) {
            var clamped = Math.max(8, Math.min(40, size));
            term.options.fontSize = clamped;
            fitAddon.fit();
        }

        function adjustFontSize(delta) {
            var current = term.options.fontSize || 14;
            setFontSize(current + delta);
        }

        function getFontSize() {
            return term.options.fontSize || 14;
        }

        function setColorTheme(name) {
            var theme = THEMES[name || 'default'];
            if (!theme) return;
            currentTheme = name;
            term.options.theme = theme;
            document.body.style.background = theme.background;
            var el = document.getElementById('terminal');
            el.style.background = theme.background;
        }

        function getCurrentTheme() {
            return currentTheme;
        }

        // --- Selección de texto con manijas ajustables (HIM-020) ---
        // xterm.js selecciona por CELDAS (term.select(col, absRow, len)) pero NO trae manijas
        // arrastrables. Las dibujamos como overlay (position:fixed) sobre .xterm-screen y, al
        // arrastrarlas, recalculamos la celda bajo el dedo y reconstruimos la selección entre el
        // ancla (extremo fijo) y el punto arrastrado. Coordenadas de fila = índice ABSOLUTO del
        // buffer (scrollback incluido): absRow = viewportY(ydisp) + fila_visible.
        // Gestos: pulsación larga = seleccionar palabra; mantener+arrastrar = extender desde el
        // ancla; arrastrar una manija = ajustar ese extremo; tap corto = cerrar.
        var selActive = false;
        var pressCell = null;   // celda donde empezó la pulsación (ancla del arrastre "fresh")
        var dragMode = null;    // null | 'fresh' | 'start' | 'end'
        var lpTimer = null;
        var lpFired = false;
        var downX = 0, downY = 0;
        var activeAnchor = null;    // extremo fijo del arrastre en curso (manija o "fresh")
        var dragTouchX = 0, dragTouchY = 0;
        var autoScrollTimer = null; // auto-scroll al arrastrar cerca de un borde
        var kbAnchor = null, kbFocus = null; // selección por teclado físico (Shift+flechas)

        var handleStart = document.getElementById('sel-start');
        var handleEnd = document.getElementById('sel-end');

        function screenRect() {
            return (document.querySelector('.xterm-screen') || term.element).getBoundingClientRect();
        }

        // Pixel (clientX/clientY) → celda absoluta {col, row}. Lógica pura en SelLogic (testeada).
        function cellFromPoint(cx, cy) {
            return SelLogic.cellFromPoint(cx, cy, screenRect(), term.cols, term.rows,
                term.buffer.active.viewportY);
        }

        // Selecciona de la celda a a la b (inclusive), normalizando el orden.
        function applySelection(a, b) {
            var n = SelLogic.normalize(a, b);
            term.select(n.start.col, n.start.row, SelLogic.selLength(n.start, n.end, term.cols));
        }

        // Arrastre unificado (manija o "fresh"): fija el foco bajo el dedo y activa auto-scroll
        // cerca de los bordes, para que la selección crezca sobre TODO el historial (no solo lo
        // visible). Antes se topaba en el borde del viewport — esa era la limitación reportada.
        function applyDrag(x, y) {
            dragTouchX = x; dragTouchY = y;
            if (activeAnchor) applySelection(activeAnchor, cellFromPoint(x, y));
            updateAutoScroll();
        }

        function stopAutoScroll() {
            if (autoScrollTimer) { clearInterval(autoScrollTimer); autoScrollTimer = null; }
        }

        function autoScrollStepNow() {
            var rect = screenRect();
            var edge = Math.max(24, rect.height * 0.12);
            return SelLogic.autoScrollStep(dragTouchY, rect.top, rect.bottom, edge, 3);
        }

        function updateAutoScroll() {
            if (autoScrollStepNow() === 0) { stopAutoScroll(); return; }
            if (autoScrollTimer) return;
            autoScrollTimer = setInterval(function() {
                if (!activeAnchor) { stopAutoScroll(); return; }
                var step = autoScrollStepNow();
                if (step === 0) { stopAutoScroll(); return; }
                term.scrollLines(step);
                applySelection(activeAnchor, cellFromPoint(dragTouchX, dragTouchY));
            }, 60);
        }

        // Desplaza el viewport lo justo para que [cell] quede visible (para selección por teclado).
        function ensureVisible(cell) {
            var vy = term.buffer.active.viewportY;
            var rel = cell.row - vy;
            if (rel < 0) term.scrollLines(rel);
            else if (rel > term.rows - 1) term.scrollLines(rel - (term.rows - 1));
        }

        // Selecciona la palabra (secuencia de no-espacios) bajo la celda dada.
        function selectWordAt(cell) {
            var line = term.buffer.active.getLine(cell.row);
            var bounds = line ? SelLogic.wordBounds(line.translateToString(false), cell.col) : null;
            if (!bounds) { applySelection(cell, cell); return; }
            applySelection({ col: bounds.start, row: cell.row }, { col: bounds.end, row: cell.row });
        }

        function placeHandle(el, cx, cy, visible) {
            if (!el) return;
            if (!visible) { el.style.display = 'none'; return; }
            el.style.left = cx + 'px';
            el.style.top = cy + 'px';
            el.style.display = 'block';
        }

        function hideHandles() { placeHandle(handleStart, 0, 0, false); placeHandle(handleEnd, 0, 0, false); }

        // Recoloca las dos manijas en los extremos de la selección actual (o las oculta si la
        // selección salió del viewport visible).
        function positionHandles() {
            if (!selActive || !term.hasSelection()) { hideHandles(); return; }
            var pos = term.getSelectionPosition();
            if (!pos) { hideHandles(); return; }
            var rect = screenRect();
            var cellW = rect.width / term.cols;
            var cellH = rect.height / term.rows;
            var vy = term.buffer.active.viewportY;
            var sTop = (pos.start.y - vy) * cellH;
            var eTop = (pos.end.y - vy) * cellH;
            placeHandle(handleStart, rect.left + pos.start.x * cellW, rect.top + sTop,
                sTop >= 0 && sTop <= rect.height);
            placeHandle(handleEnd, rect.left + pos.end.x * cellW, rect.top + eTop + cellH,
                (eTop + cellH) >= 0 && (eTop + cellH) <= rect.height + cellH);
        }

        function notifySelecting(on) {
            try {
                if (window.BastionBridge && window.BastionBridge.onSelectionActive) {
                    window.BastionBridge.onSelectionActive(on);
                }
            } catch (e) {}
        }

        function enterSelectionWord(cell) {
            selActive = true;
            pressCell = cell;
            selectWordAt(cell);
            positionHandles();
            notifySelecting(true);
        }

        function exitSelection() {
            selActive = false; dragMode = null; lpFired = false;
            pressCell = null; activeAnchor = null;
            kbAnchor = null; kbFocus = null;
            stopAutoScroll();
            try { term.clearSelection(); } catch (e) {}
            hideHandles();
            notifySelecting(false);
        }

        // F1: el SO puede cancelar el gesto (notificación, palm-rejection, gesto de navegación).
        // Sin esto, dragMode quedaría pegado y el auto-scroll correría para siempre. Aborta el
        // arrastre pero conserva la selección ya hecha.
        function cancelDrag() {
            dragMode = null;
            stopAutoScroll();
            if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
            if (selActive) positionHandles();
        }

        // Llamadas desde Kotlin para cerrar la selección.
        function setSelectionMode(on) { if (!on) exitSelection(); }
        function clearSelectionMode() { exitSelection(); }

        function copySelection() {
            try {
                if (term.hasSelection && term.hasSelection()) {
                    var s = term.getSelection();
                    if (s && window.BastionBridge) window.BastionBridge.copyToClipboard(s);
                }
            } catch (e) {}
        }

        function copyAll() {
            try {
                term.selectAll();
                var s = term.getSelection();
                if (s && window.BastionBridge) window.BastionBridge.copyToClipboard(s);
            } catch (e) {}
        }

        // Reposicionar manijas cuando xterm cambia la selección (p.ej. cada term.select del arrastre).
        term.onSelectionChange(function() { if (selActive) positionHandles(); });

        // Arrastre de una manija: ancla el extremo opuesto y reajusta el extremo arrastrado.
        function bindHandle(el, which) {
            if (!el) return;
            el.addEventListener('touchstart', function(e) {
                if (!selActive) return;
                e.preventDefault(); e.stopPropagation();
                var pos = term.getSelectionPosition();
                if (!pos) return;
                if (which === 'start') {
                    activeAnchor = { col: Math.max(0, pos.end.x - 1), row: pos.end.y };
                    dragMode = 'start';
                } else {
                    activeAnchor = { col: pos.start.x, row: pos.start.y };
                    dragMode = 'end';
                }
            }, { passive: false });
            el.addEventListener('touchmove', function(e) {
                if (!dragMode || e.touches.length !== 1) return;
                e.preventDefault(); e.stopPropagation();
                var t = e.touches[0];
                applyDrag(t.clientX, t.clientY);
            }, { passive: false });
            el.addEventListener('touchend', function(e) {
                if (!dragMode) return;
                e.preventDefault(); e.stopPropagation();
                dragMode = null; stopAutoScroll();
                positionHandles();
            }, { passive: false });
            el.addEventListener('touchcancel', function() { cancelDrag(); }, { passive: true });
        }
        bindHandle(handleStart, 'start');
        bindHandle(handleEnd, 'end');

        // --- Selección con teclado físico: Shift + flechas / Home / End (como un editor) ---
        // Arranca el ancla en la posición del cursor y mueve el foco. Ctrl+Shift+C copia,
        // Escape limpia. Devolver false evita que xterm mande la secuencia de escape al shell.
        term.attachCustomKeyEventHandler(function(e) {
            if (e.type !== 'keydown') return true;
            var shift = e.shiftKey, ctrl = e.ctrlKey || e.metaKey, k = e.key;

            if (ctrl && shift && (k === 'C' || k === 'c')) {
                if (term.hasSelection && term.hasSelection()) { copySelection(); return false; }
                return true;
            }
            if (k === 'Escape' && selActive) { exitSelection(); return false; }

            var isSel = shift && (k === 'ArrowLeft' || k === 'ArrowRight' || k === 'ArrowUp' ||
                                  k === 'ArrowDown' || k === 'Home' || k === 'End');
            if (isSel) {
                if (!kbAnchor) {
                    var cx = term.buffer.active.cursorX;
                    var cy = term.buffer.active.viewportY + term.buffer.active.cursorY;
                    kbAnchor = { col: cx, row: cy };
                    kbFocus = { col: cx, row: cy };
                }
                kbFocus = SelLogic.moveFocus(k, kbFocus, term.cols, term.buffer.active.length);
                selActive = true;
                ensureVisible(f);
                applySelection(kbAnchor, kbFocus);
                positionHandles();
                notifySelecting(true);
                return false;
            }

            // Cualquier otra tecla real (no modificador) cierra la selección y sigue el tecleo.
            var mod = (k === 'Shift' || k === 'Control' || k === 'Alt' || k === 'Meta');
            if (kbAnchor && !mod) { exitSelection(); }
            return true;
        });

        // Gestos sobre la terminal: pulsación larga → palabra; mantener+arrastrar → extender.
        (function() {
            var host = document.getElementById('terminal');
            var MOVE_CANCEL = 12; // px antes de la pulsación larga = scroll, no selección

            host.addEventListener('touchstart', function(e) {
                if (e.touches.length !== 1) {
                    if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
                    return;
                }
                if (dragMode) return; // ya se está arrastrando una manija
                var t = e.touches[0];
                downX = t.clientX; downY = t.clientY;
                lpFired = false;
                if (lpTimer) clearTimeout(lpTimer);
                lpTimer = setTimeout(function() {
                    lpTimer = null; lpFired = true;
                    enterSelectionWord(cellFromPoint(downX, downY));
                    dragMode = 'fresh';
                    activeAnchor = pressCell;
                }, 400);
            }, { passive: false });

            host.addEventListener('touchmove', function(e) {
                if (e.touches.length !== 1) return;
                var t = e.touches[0];
                if (dragMode === 'fresh') {
                    e.preventDefault();
                    applyDrag(t.clientX, t.clientY);
                    return;
                }
                if (lpTimer) {
                    if (Math.hypot(t.clientX - downX, t.clientY - downY) > MOVE_CANCEL) {
                        clearTimeout(lpTimer); lpTimer = null;
                    }
                }
            }, { passive: false });

            host.addEventListener('touchend', function(e) {
                if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
                if (dragMode === 'fresh') { dragMode = null; stopAutoScroll(); positionHandles(); return; }
                // Tap corto mientras hay selección → cerrar.
                if (selActive && !lpFired) { exitSelection(); }
            }, { passive: false });

            host.addEventListener('touchcancel', function() { cancelDrag(); }, { passive: true });
        })();

        var el = document.getElementById('terminal');
        var lastPinchDist = 0;
        var pinchActive = false;

        el.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                pinchActive = true;
                lastPinchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            }
        }, { passive: true });

        el.addEventListener('touchmove', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                var dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                var ratio = dist / lastPinchDist;
                if (ratio > 1.08) {
                    adjustFontSize(1);
                    lastPinchDist = dist;
                } else if (ratio < 0.92) {
                    adjustFontSize(-1);
                    lastPinchDist = dist;
                }
            }
        }, { passive: false });

        el.addEventListener('touchend', function(e) {
            if (e.touches.length < 2) {
                pinchActive = false;
            }
        }, { passive: true });
    </script>
</body>
</html>
