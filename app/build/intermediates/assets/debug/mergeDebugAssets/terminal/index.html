<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal</title>
    <link rel="stylesheet" href="xterm.css">
    <style>
        html, body, #terminal { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
    </style>
</head>
<body>
    <div id="terminal"></div>

    <script src="xterm.js"></script>
    <script src="xterm-addon-fit.js"></script>
    <script>
        var THEMES = {
            'stitch': {
                background: '#121414', foreground: '#e2e2e2',
                cursor: '#75d1ff', selectionBackground: '#333535',
                black: '#121414', red: '#ffb4ab', green: '#75d1ff', yellow: '#c8c6c5',
                blue: '#009cce', magenta: '#c8c6c5', cyan: '#75d1ff', white: '#e2e2e2',
                brightBlack: '#444748', brightRed: '#ffb4ab', brightGreen: '#75d1ff', brightYellow: '#c8c6c5',
                brightBlue: '#009cce', brightMagenta: '#c8c6c5', brightCyan: '#75d1ff', brightWhite: '#ffffff'
            },
            'default': {
                background: '#1e1e1e', foreground: '#d4d4d4',
                cursor: '#d4d4d4', selectionBackground: '#444444',
                black: '#000000', red: '#cd3131', green: '#0dbc79', yellow: '#e5e510',
                blue: '#2472c8', magenta: '#bc3fbc', cyan: '#11a8cd', white: '#e5e5e5',
                brightBlack: '#666666', brightRed: '#f14c4c', brightGreen: '#23d18b', brightYellow: '#f5f543',
                brightBlue: '#3b8eea', brightMagenta: '#d670d6', brightCyan: '#29b8db', brightWhite: '#e5e5e5'
            },
            'light': {
                background: '#ffffff', foreground: '#000000',
                cursor: '#000000', selectionBackground: '#c0c0c0',
                black: '#000000', red: '#cd3131', green: '#00a800', yellow: '#a8a800',
                blue: '#0000a8', magenta: '#a800a8', cyan: '#00a8a8', white: '#e5e5e5',
                brightBlack: '#666666', brightRed: '#cd3131', brightGreen: '#00a800', brightYellow: '#a8a800',
                brightBlue: '#0000a8', brightMagenta: '#a800a8', brightCyan: '#00a8a8', brightWhite: '#ffffff'
            },
            'monokai': {
                background: '#272822', foreground: '#f8f8f2',
                cursor: '#f8f8f2', selectionBackground: '#49483e',
                black: '#272822', red: '#f92672', green: '#a6e22e', yellow: '#f4bf75',
                blue: '#66d9ef', magenta: '#ae81ff', cyan: '#a1efe4', white: '#f8f8f2',
                brightBlack: '#75715e', brightRed: '#f92672', brightGreen: '#a6e22e', brightYellow: '#f4bf75',
                brightBlue: '#66d9ef', brightMagenta: '#ae81ff', brightCyan: '#a1efe4', brightWhite: '#f9f8f5'
            },
            'solarized-dark': {
                background: '#002b36', foreground: '#839496',
                cursor: '#839496', selectionBackground: '#073642',
                black: '#073642', red: '#dc322f', green: '#859900', yellow: '#b58900',
                blue: '#268bd2', magenta: '#d33682', cyan: '#2aa198', white: '#eee8d5',
                brightBlack: '#002b36', brightRed: '#cb4b16', brightGreen: '#586e75', brightYellow: '#657b83',
                brightBlue: '#839496', brightMagenta: '#6c71c4', brightCyan: '#93a1a1', brightWhite: '#fdf6e3'
            },
            'dracula': {
                background: '#282a36', foreground: '#f8f8f2',
                cursor: '#f8f8f2', selectionBackground: '#44475a',
                black: '#21222c', red: '#ff5555', green: '#50fa7b', yellow: '#f1fa8c',
                blue: '#bd93f9', magenta: '#ff79c6', cyan: '#8be9fd', white: '#f8f8f2',
                brightBlack: '#6272a4', brightRed: '#ff6e6e', brightGreen: '#69ff94', brightYellow: '#ffffa5',
                brightBlue: '#d6acff', brightMagenta: '#ff92df', brightCyan: '#a4ffff', brightWhite: '#ffffff'
            },
            'nord': {
                background: '#2e3440', foreground: '#d8dee9',
                cursor: '#d8dee9', selectionBackground: '#434c5e',
                black: '#3b4252', red: '#bf616a', green: '#a3be8c', yellow: '#ebcb8b',
                blue: '#81a1c1', magenta: '#b48ead', cyan: '#88c0d0', white: '#e5e9f0',
                brightBlack: '#4c566a', brightRed: '#bf616a', brightGreen: '#a3be8c', brightYellow: '#ebcb8b',
                brightBlue: '#81a1c1', brightMagenta: '#b48ead', brightCyan: '#8fbcbb', brightWhite: '#eceff4'
            }
        };

        var currentTheme = 'default';
        var term = new Terminal({
            cursorBlink: true,
            cursorStyle: 'block',
            fontSize: 14,
            fontFamily: 'Menlo, Monaco, "Courier New", monospace',
            theme: THEMES['default'],
            allowProposedApi: true,
            cols: 80,
            rows: 24
        });

        var fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);

        term.open(document.getElementById('terminal'));

        setTimeout(function() { fitAddon.fit(); }, 100);

        window.addEventListener('resize', function() { fitAddon.fit(); });

        term.onData(function(data) {
            try {
                if (window.BastionBridge) {
                    window.BastionBridge.onData(data);
                }
            } catch(e) {
                console.error('Bastion onData error:', e.message || e);
            }
        });

        var prevCols = term.cols, prevRows = term.rows;
        var resizeCheck = setInterval(function() {
            if (term.cols !== prevCols || term.rows !== prevRows) {
                prevCols = term.cols;
                prevRows = term.rows;
                if (window.BastionBridge) {
                    window.BastionBridge.onResize(prevCols, prevRows);
                }
            }
        }, 300);

        function writeToTerminal(base64Data) {
            try {
                var binaryStr = atob(base64Data);
                var len = binaryStr.length;
                var bytes = new Uint8Array(len);
                for (var i = 0; i < len; i++) {
                    bytes[i] = binaryStr.charCodeAt(i);
                }
                term.write(bytes);
            } catch(e) {
                console.error('writeToTerminal error:', e);
            }
        }

        function setSize(cols, rows) {
            term.resize(cols, rows);
            fitAddon.fit();
        }

        function setFontSize(size) {
            var clamped = Math.max(8, Math.min(40, size));
            term.options.fontSize = clamped;
            fitAddon.fit();
        }

        function adjustFontSize(delta) {
            var current = term.options.fontSize || 14;
            setFontSize(current + delta);
        }

        function getFontSize() {
            return term.options.fontSize || 14;
        }

        function setColorTheme(name) {
            var theme = THEMES[name || 'default'];
            if (!theme) return;
            currentTheme = name;
            term.options.theme = theme;
            document.body.style.background = theme.background;
            var el = document.getElementById('terminal');
            el.style.background = theme.background;
        }

        function getCurrentTheme() {
            return currentTheme;
        }

        var el = document.getElementById('terminal');
        var lastPinchDist = 0;
        var pinchActive = false;

        el.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                pinchActive = true;
                lastPinchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            }
        }, { passive: true });

        el.addEventListener('touchmove', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                var dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                var ratio = dist / lastPinchDist;
                if (ratio > 1.08) {
                    adjustFontSize(1);
                    lastPinchDist = dist;
                } else if (ratio < 0.92) {
                    adjustFontSize(-1);
                    lastPinchDist = dist;
                }
            }
        }, { passive: false });

        el.addEventListener('touchend', function(e) {
            if (e.touches.length < 2) {
                pinchActive = false;
            }
        }, { passive: true });
    </script>
</body>
</html>
