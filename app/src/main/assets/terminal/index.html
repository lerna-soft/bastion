<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal</title>
    <link rel="stylesheet" href="xterm.css">
    <style>
        html, body, #terminal { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
    </style>
</head>
<body>
    <div id="terminal"></div>

    <script src="xterm.js"></script>
    <script src="xterm-addon-fit.js"></script>
    <script>
        var term = new Terminal({
            cursorBlink: true,
            cursorStyle: 'block',
            fontSize: 14,
            fontFamily: 'Menlo, Monaco, "Courier New", monospace',
            theme: { background: '#1e1e1e', foreground: '#d4d4d4' },
            allowProposedApi: true,
            cols: 80,
            rows: 24
        });

        var fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);

        term.open(document.getElementById('terminal'));

        // Fit terminal after a small delay to ensure layout is complete
        setTimeout(function() { fitAddon.fit(); }, 100);

        // Re-fit on resize
        window.addEventListener('resize', function() { fitAddon.fit(); });

        // Forward terminal output to Android
        term.onData(function(data) {
            if (window.BastionBridge) {
                window.BastionBridge.onData(data);
            }
        });

        // Forward resize to Android
        var prevCols = term.cols, prevRows = term.rows;
        var resizeCheck = setInterval(function() {
            if (term.cols !== prevCols || term.rows !== prevRows) {
                prevCols = term.cols;
                prevRows = term.rows;
                if (window.BastionBridge) {
                    window.BastionBridge.onResize(prevCols, prevRows);
                }
            }
        }, 300);

        // Write data from Android to terminal
        function writeToTerminal(base64Data) {
            try {
                var binaryStr = atob(base64Data);
                var len = binaryStr.length;
                var bytes = new Uint8Array(len);
                for (var i = 0; i < len; i++) {
                    bytes[i] = binaryStr.charCodeAt(i);
                }
                term.write(bytes);
            } catch(e) {
                console.error('writeToTerminal error:', e);
            }
        }

        // Called from Android to set terminal size
        function setSize(cols, rows) {
            term.resize(cols, rows);
            fitAddon.fit();
        }
    </script>
</body>
</html>
